<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect x="0" y="188" width="800" height="4" rx="0" fill="url(#accent)" opacity="0.6"/>

  <!-- Icon -->
  <g transform="translate(180, 55)">
    <!-- Shield shape -->
    <path d="M30 5 L55 15 L55 45 C55 65 42 78 30 85 C18 78 5 65 5 45 L5 15 Z" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.9"/>
    <!-- Checkmark inside -->
    <path d="M20 42 L28 52 L42 32" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot sync arrows -->
    <path d="M60 35 Q70 25 80 35" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <path d="M78 32 L80 35 L77 37" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M80 55 Q70 65 60 55" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <path d="M62 58 L60 55 L63 53" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="310" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">envsync</text>

  <!-- Tagline -->
  <text x="310" y="130" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">Stop deploying with missing environment variables.</text>

  <!-- Tags -->
  <rect x="310" y="145" width="48" height="22" rx="11" fill="#22d3ee" opacity="0.15"/>
  <text x="334" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#22d3ee" text-anchor="middle">check</text>

  <rect x="366" y="145" width="36" height="22" rx="11" fill="#818cf8" opacity="0.15"/>
  <text x="384" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#818cf8" text-anchor="middle">diff</text>

  <rect x="410" y="145" width="36" height="22" rx="11" fill="#4ade80" opacity="0.15"/>
  <text x="428" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle">lint</text>

  <rect x="454" y="145" width="42" height="22" rx="11" fill="#f97316" opacity="0.15"/>
  <text x="475" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#f97316" text-anchor="middle">scan</text>

  <rect x="504" y="145" width="68" height="22" rx="11" fill="#f472b6" opacity="0.15"/>
  <text x="538" y="160" font-family="system-ui, sans-serif" font-size="11" fill="#f472b6" text-anchor="middle">template</text>
</svg>
