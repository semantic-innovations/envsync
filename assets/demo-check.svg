<svg xmlns="http://www.w3.org/2000/svg" width="620" height="340" viewBox="0 0 620 340">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
  </defs>
  <!-- Window frame -->
  <rect width="620" height="340" rx="10" fill="url(#tbg)"/>
  <!-- Title bar -->
  <rect width="620" height="36" rx="10" fill="#313244"/>
  <rect x="0" y="26" width="620" height="10" fill="#313244"/>
  <!-- Window buttons -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="310" y="23" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#cdd6f4" text-anchor="middle">envsync check</text>

  <!-- Terminal content -->
  <g transform="translate(24, 56)">
    <!-- Prompt -->
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#89b4fa">
      <tspan x="0" dy="0">$</tspan><tspan fill="#cdd6f4"> envsync check</tspan>
    </text>

    <!-- Header -->
    <text y="36" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" font-weight="bold" fill="#cdd6f4">  envsync check</text>
    <text y="56" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#585b70">  ────────────────────────────────────────</text>

    <!-- Results -->
    <text y="80" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#a6e3a1">  ✓</tspan><tspan fill="#cdd6f4"> DATABASE_URL</tspan>
    </text>
    <text y="100" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#a6e3a1">  ✓</tspan><tspan fill="#cdd6f4"> REDIS_URL</tspan>
    </text>
    <text y="120" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#a6e3a1">  ✓</tspan><tspan fill="#cdd6f4"> PORT</tspan>
    </text>
    <text y="140" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#a6e3a1">  ✓</tspan><tspan fill="#cdd6f4"> JWT_SECRET</tspan>
    </text>
    <text y="160" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#f9e2af">  ⚠</tspan><tspan fill="#cdd6f4"> API_KEY </tspan><tspan fill="#f9e2af">(empty)</tspan>
    </text>
    <text y="180" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#f38ba8">  ✗</tspan><tspan fill="#cdd6f4"> STRIPE_SECRET </tspan><tspan fill="#f38ba8">(missing)</tspan>
    </text>
    <text y="200" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#f38ba8">  ✗</tspan><tspan fill="#cdd6f4"> NEW_FEATURE_FLAG </tspan><tspan fill="#f38ba8">(missing)</tspan>
    </text>

    <!-- Divider -->
    <text y="228" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#585b70">  ────────────────────────────────────────</text>

    <!-- Summary -->
    <text y="252" font-family="'SF Mono', 'Fira Code', monospace" font-size="13">
      <tspan fill="#a6e3a1">  4 passed</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#f38ba8">2 failed</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#f9e2af">1 warning</tspan>
    </text>
  </g>
</svg>
